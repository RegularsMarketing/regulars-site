menu_items:
  - number: '01'
    title: Google Business Profile & Local SEO
    short: Own the map. Show up when hungry people search nearby.
    description: Full onboarding optimization (verified name, correct categories, hours, keyword-informed description, HTML menu link), your photos uploaded and organized at setup (15-20 to start) with 3-5 added monthly, and one Google Post every week.
    category: Get Found
    badge: Foundation
  - number: '02'
    title: Review Generation & Reputation Management
    short: Turn happy guests into public proof, with every review answered.
    description: Automated review requests by email from week one, and by text once your carrier registration clears. You also get QR review cards, and every Google review answered within 48 hours, positive or negative, using a tone guide written for your business.
    category: Get Found
    badge: Foundation
  - number: '03'
    title: Website Builds
    short: Reservations and ordering built into the site itself.
    description: A fast, mobile-first site with reservation and ordering integration built in from day one. Live within 21 days of receiving your content, hosted and maintained by us.
    category: The Whole Engine
    badge: Full House
  - number: '04'
    title: Email List Building & SMS/Email Campaigns
    short: The list you own, on the one channel no algorithm can take away.
    description: List building syncs monthly with your POS (Toast, Square, OpenTable, Resy). Full campaign sends (2-4 a month with trackable redemption codes) are a Full House feature.
    category: Get Craved
    badge: Growth
  - number: '05'
    title: Missed-Call Text-Back
    short: Slammed mid-rush? Every missed call gets an instant text.
    description: The moment a call goes unanswered, the caller gets a friendly text within seconds, asking how we can help and linking them to book. Calls go missed at the busiest hours; this recovers them automatically, around the clock, from the day your carrier texting registration clears.
    category: Get Booked
    badge: Foundation
  - number: '06'
    title: AI Catering & Events Engine
    short: Catering inquiries answered in 30 seconds, then qualified, followed up, booked.
    description: A dedicated catering page on your site feeds an AI events assistant that texts back instantly, gathers the date, headcount, and occasion, and books a call with you, then follows up automatically until they answer. Big events get flagged to the owner within the hour. Email follow-up runs from day one; the texting half switches on when your carrier registration clears.
    category: Get Booked
    badge: Full House
pages:
  home:
    seo_title: Regulars | Flat-Rate Marketing for Small Business
    seo_description: Regulars is the flat-rate marketing partner for owner-operated small businesses, restaurants and cafés first. Local SEO, reviews, email and SMS, and AI-powered follow-up that turn first-timers into loyal regulars. Published prices, no lock-in.
    hero:
      eyebrow: Marketing for Owner-Operated Small Businesses
      headline: Your business has one address. Most marketing is built for eleven hundred.
      subhead: Regulars is the flat-rate marketing partner for owner-operated small businesses that are invisible online. We started with restaurants and cafés, and we know them cold. We publish our prices. We never lock you in.
      primary_cta:
        label: Book a Free Visibility Audit
        url: /book-a-call/
      secondary_cta:
        label: See How It Works
        url: /process/
      bg_image: ''
    thesis:
      eyebrow: The Thesis
      heading: Why retention is the whole business.
      rows:
        - label: Revenue that comes from guests who have already eaten there
          value: 65-80%
        - label: First-time guests who never come back
          value: ~70%
        - label: Lifetime value of a regular vs. a one-timer
          value: 26×
      link:
        label: See where these numbers come from →
        url: /ledger/
    split:
      left:
        eyebrow: Who We Are
        heading: A marketing partner that's never run a franchise playbook.
        paragraphs:
          - Regulars is a done-for-you marketing partner built for owner-operated small businesses, starting with restaurants and cafés. Never chains, never franchises. The industry's marketing playbook was written for companies with a hundred locations and a marketing department; independents were left to figure it out after a double shift.
          - We're a small business too, so we build like one. Hands-on, responsive, and focused on the handful of things that actually bring guests back.
      right:
        eyebrow: What We're Building
        heading: The big-chain playbook, minus the overhead.
        paragraphs:
          - 'Every national chain already does this: own the customer list, own the reputation, make it easy to come back. Independents rarely have the systems to do the same, so we build them, sized and priced for one location.'
        badges:
          - k: Own your list
            v: Email + SMS tied directly to your POS system.
          - k: Own your reputation
            v: Every review answered, every profile managed, every week.
    services_teaser:
      heading: 'Six services. One goal: more regulars.'
      subhead: Everything we do in year one is focused on turning up how often people come back, and on making sure no call, inquiry, or first-timer slips through the cracks.
      cta:
        label: Explore All Services
        url: /services/
    exclusions:
      eyebrow: Scope, On Purpose
      heading: What's not on the menu (yet).
      subhead: Year one is intentionally narrow. A handful of things done properly beats fifteen things done halfway.
      chips:
        - Paid ads
        - Social media management
        - Funnels
        - Influencer marketing
        - National SEO
        - Cold outreach for clients
        - Custom apps
        - Video beyond short-form
      quote: That's outside your plan. I keep the menu tight so everything on it actually works.
    cta:
      heading: Ready to turn first-timers into regulars?
      subhead: Book a free 15-minute discovery call. No pitch deck, no pressure, just a straight look at where you're losing regulars.
      button:
        label: Book a Free Audit
        url: /book-a-call/
  story:
    values:
      - title: Retention over acquisition
        body: A repeat guest is worth more than ten one-timers. Everything we build points at the second visit and the tenth.
      - title: Own what you build
        body: Your list, your reviews, your Google profile. You own all of it outright, and it stays yours whatever the algorithms do next.
      - title: Built for your address
        body: No franchise red tape and no corporate marketing department in the way. Just what an independent owner actually needs, whether that is one room or three.
      - title: Process over promises
        body: We're pre-launch and we say so. What we have instead of case studies is the whole process, published in order, for you to read before you ever sign anything.
    values_heading: What we believe
    steps:
      - num: '01'
        heading: 65-80% of a restaurant's revenue comes from people who've already eaten there before.
        body: 'Source: National Restaurant Association.'
      - num: '02'
        heading: And yet roughly 7 out of 10 first-time guests never make it back a second time.
        body: The gap between those two numbers is where most independent restaurants lose money quietly, month after month.
      - num: '03'
        heading: Chains solved this decades ago.
        body: Loyalty programs, CRM systems, marketing teams built entirely around the second visit and every visit after it.
      - num: '04'
        heading: Independents got left behind, doing it by instinct instead of systems.
        body: Regulars brings the big-chain playbook to the one-location restaurant, at a flat rate.
    eyebrow: Our Story
    outro: 'So that''s what we build: the systems a chain would have, sized and priced for a restaurant with one location and an owner who''s already doing five jobs. We only work with small businesses. We publish our prices. We never lock you in.'
    intro: Regulars started at a family table. It traces back to Sammy's, a family-owned restaurant where **we watched, up close, what actually keeps a small restaurant alive.** It was never really the first-time visitors who carried it through a slow winter or a rough month. It was the regulars, the ones who knew the servers by name, ordered "the usual," and kept showing up.
    seo_title: Our Story | Small Business Marketing, Born in a Restaurant | Regulars
    hero_quote: Every great restaurant is really just a room full of people who keep coming back.
    seo_description: Where Regulars comes from. We bring the big-chain retention playbook to owner-operated small businesses, restaurants and cafés first. Built from a family table, priced flat, never locked in.
  services:
    seo_title: Services | Local SEO, Reviews, Websites, Email & AI Follow-Up for Small Business | Regulars
    seo_description: 'Six done-for-you marketing services for owner-operated small businesses, restaurants and cafés first: Google Business & local SEO, review generation, website builds, email/SMS list building, missed-call text-back, and an AI catering & events engine.'
    eyebrow: Services
    heading: Six services, working together to build your regulars.
    subhead: We keep our scope tight on purpose. No paid ads, no influencer campaigns, no bloat. Just the things that reliably turn first-timers into regulars and make sure the guests already reaching out never slip away.
    cta:
      label: See Pricing
      url: /pricing/
  process:
    seo_title: Our Process | How Marketing Works at Regulars
    seo_description: From free discovery call to monthly reporting, see exactly how Regulars audits, builds, launches, and grows local visibility and retention for owner-operated small businesses, restaurants and cafés first.
    eyebrow: How We Work
    heading: We're pre-launch, so the process is what we lead with.
    subhead: No fake testimonials, no borrowed case studies. Here's exactly what happens, in order, when you work with Regulars.
    steps:
      - num: '01'
        heading: Free Discovery Call
        body: A 15-minute conversation about your business, what’s already working, and where first-timers are slipping through the cracks. No pitch deck.
      - body: We pull your starting numbers (Google views, calls, direction requests, review count and rating, social following, list size) before anything changes, so every result later has a number to prove it.
        heading: Audit & Baseline
        num: '02'
      - num: '03'
        heading: Onboarding Build
        body: 'We set up the systems: Google Business Profile, review flow, content calendar, and (for Full House) your website and POS-connected list. Your texting registration goes to the carriers on day one, because that''s the piece with a queue in front of it. Full House builds go live within 21 days of receiving your content.'
      - num: '04'
        heading: Launch
        body: Your profile, reviews, email and site go live together and work from the same playbook from day one. Texting is the one piece we can't switch on ourselves. Carriers review every business that sends, and that takes anywhere from a few days to about three weeks. It joins the moment it clears, and you'll always know where it stands.
      - num: '05'
        heading: Grow, the monthly cycle
        body: Reviews answered within 48 hours. Reports by the 5th business day of every month, in plain English, measured against your baseline. One human owns your account.
    closing_note: That's the whole process. Nothing hidden behind a "schedule a call to learn more."
    cta:
      label: See What Each Step Costs
      url: /pricing/
  pricing:
    subhead: Most agencies make you book a call just to find out what something costs. We don't. Pick a door.
    heading: Three ways in. Every price, published.
    final_cta:
      label: Book Your Free Audit
      url: /book-a-call/
    guarantees_quote: We never promise rankings. No honest agency can. We promise the work, the responsiveness, and the measurement.
    eyebrow: Pricing
    guarantees:
      - label: Setup fee
        value: $297
      - label: Waived on
        value: 12-mo terms
      - label: Initial term
        value: 90 days
      - label: After that
        value: Month-to-month
      - label: Cancellation notice
        value: 30 days
      - label: Billing
        value: Autopay, 1st
      - label: Annual rate adjustment
        value: 5-8%
      - label: Ownership
        value: Domain, list & content
      - label: Texting goes live
        value: After carrier approval
    door_three:
      label: Door Three
      title: The Retainer
      subhead: One flat monthly price. No hourly billing, no surprise invoices.
      tiers:
        - name: Foundation
          amount: $497
          per: per month · "Get found, get trusted"
          flagship: false
          summary:
            - Google Business Profile management
            - Citations & listings cleanup
            - Review generation & response system
            - Missed-call text-back
            - Monthly one-page report
          details:
            - heading: Google Business Profile
              items:
                - 'Full onboarding optimization: name verification, primary + secondary categories, hours, attributes, keyword-informed description, HTML menu link, reservation/ordering links'
                - 1 Google Post per week (4-5/month)
                - Holiday and special hours pushed to your profile before every holiday
                - Ongoing protection against spam edits; Google-added junk services removed monthly; monthly keyword review
            - heading: Citations & Listings
              items:
                - NAP correction across Yelp, TripAdvisor, Apple Maps, Bing Places, Facebook + 5 food-specific directories
                - Quarterly consistency re-check
            - heading: Review System
              items:
                - Print-ready QR review cards + table tents (printing at cost, ~$40)
                - Automated review requests by email from week one, by text once your carrier registration clears
                - Every Google review answered within 48 hours, in your tone
                - Same-day alert + drafted response for any 1-2 star review
                - Never buy, gate, or incentivize reviews, ever
            - heading: Missed-Call Text-Back
              items:
                - Every unanswered call gets an instant, friendly text within seconds, 24/7, including mid-rush and after hours, from the day your carrier registration clears
                - Goes live when your carrier texting registration clears, and we file it on day one
                - Caller replies land in one inbox, answered by a human within 1 business day
                - Missed calls recovered are counted in your monthly report
            - heading: Reporting
              items:
                - 'Monthly one-page report by the 5th business day: views, calls, directions, clicks vs. baseline'
                - Direct line to your account owner, 1-business-day reply
          not_included: 'Not included: social posting, website work, email/SMS campaigns, AI catering engine, paid ads.'
          button:
            label: Book a Call
            url: /book-a-call/
        - name: Growth
          amount: $897
          per: per month · "…get craved"
          flagship: true
          summary:
            - Everything in Foundation
            - Email & text list building
            - Monthly opt-in sync with your POS
          details:
            - heading: Email & Text List Building
              items:
                - Branded signup page, QR code, print-ready table tents
                - Welcome automation that fires once a signup confirms their opt-in
                - Monthly sync with your POS/reservation system
                - 'Full TCPA compliance: double opt-in, unsubscribe, documented consent'
                - List growth tracked monthly. The list is contractually yours, and it leaves with you
          not_included: 'Not included: social posting, campaign sends (+$700/mo add-on), website work, AI catering engine (+$300/mo add-on).'
          button:
            label: Book a Call
            url: /book-a-call/
        - name: Full House
          amount: $1,997
          per: per month · "The whole engine"
          flagship: false
          summary:
            - Everything in Growth
            - Website build, hosting & maintenance
            - Reservation/ordering integration
            - AI catering & events engine
            - 2-4 email/SMS campaigns per month
          details:
            - heading: Website (Built, Hosted, Maintained)
              items:
                - 'Mobile-first site: Home, HTML menu, About, Reservations/Ordering, Contact + map'
                - Reservation/ordering integration on OpenTable, Resy, Square Online or Toast (yours or a new setup), plus Reserve with Google where supported. Anything else, we scope it before we promise it
                - Hosting, SSL, and maintenance included
                - Up to 4 content updates/month, 2-business-day turnaround
                - Local SEO fundamentals + local business schema markup on every page
                - Live within 21 days of receiving your content
            - heading: AI Catering & Events Engine
              items:
                - Dedicated catering page + inquiry form built into your site
                - AI events assistant texts every inquiry back within seconds, gathering date, headcount, and occasion, then books a call with you
                - Automated follow-up until they answer, so no inquiry sits overnight
                - Big events (weddings, large headcounts, short notice) flagged to the owner within the hour
                - Post-event review request and next-year rebooking nudge
            - heading: Email & SMS Campaigns
              items:
                - 2-4 campaigns/month, planned quarterly with you. Never more than 4 marketing texts to a guest in a month, which is what their opt-in promised them
                - We write and design; you approve every send before it goes out, with one clear offer + trackable redemption code per campaign
                - Redemptions tracked in your monthly report
          not_included: 'Not included: e-commerce builds, custom code, loyalty apps, paid advertising.'
          button:
            label: Book a Call
            url: /book-a-call/
    guarantees_heading: Every Tier, Always
    addons:
      - name: Email & text list building
        price: +$100/mo
      - name: Email & SMS campaigns
        price: +$700/mo
      - name: Website updates, 4/month
        price: +$300/mo
      - name: AI catering & events engine
        price: +$300/mo
    addons_subhead: Add any of these to any tier. Foundation clients can buy anything on this list.
    door_one:
      label: Door One
      title: The Free Visibility Audit
      body: A 15-minute look at your Google profile, reviews, socials, and site. What's working, what's not, and three fixes you could make this week. Zero cost, zero commitment.
      button:
        label: Book Your Free Audit
        url: /book-a-call/
    addons_heading: Add-Ons
    seo_title: Pricing | Flat-Rate Small Business Marketing Plans & Projects | Regulars
    seo_description: Every price published. Free visibility audit, one-off launch projects from $300, and flat monthly retainers from $497 for owner-run small businesses, restaurants and cafés first. No quotes, no lock-in.
    door_two:
      label: Door Two
      title: Launch Projects
      subhead: For small businesses that want one thing fixed now, before any monthly relationship.
      projects:
        - title: Website Launch
          price: $1,800
          items:
            - Custom-built, mobile-first site you can edit yourself
            - Reservation/ordering integration
            - GBP basic cleanup
            - 30 days of post-launch fixes
        - title: Google Rescue
          price: $797
          items:
            - Full GBP optimization
            - Citation cleanup
            - Review-link setup
        - title: List Starter
          price: $400
          items:
            - QR + signup form
            - Welcome automation
            - Table tents
        - title: Review System
          price: $300
          items:
            - Request automation
            - QR review cards
            - Response tone guide
      note: Every Launch Project includes a **$300 credit** toward your first retainer month, if you start within 60 days. Website-only? Our **$99/mo Care Plan** covers hosting plus one content update a month, with extra updates at $75 each.
