menu_items:
  - number: '01'
    title: Google Business Profile & Local SEO
    short: Own the map. Show up when hungry people search nearby.
    description: Full onboarding optimization — verified name, correct categories, hours, keyword-informed description, HTML menu link — plus 15–20 photos at setup, 3–5 added monthly, and one Google Post every week.
    tier: Foundation
    category: Get Found
  - number: '02'
    title: Review Generation & Reputation Management
    short: Turn happy guests into public proof — every review answered.
    description: Automated review requests by text and email, QR review cards, and every Google review answered within 48 hours — positive or negative — using a tone guide written for your restaurant.
    tier: Foundation
    category: Get Found
  - number: '03'
    title: Social Media Content
    short: Consistent, on-brand posting that keeps you top of mind.
    description: 12–16 posts a month across Instagram and Facebook, including one on-site content session monthly where we shoot your food and space — you never have to send us anything.
    tier: Growth
    category: Get Craved
  - number: '04'
    title: Website Builds
    short: Reservations and ordering built in — not bolted on.
    description: A fast, mobile-first site with reservation and ordering integration built in from day one — live within 21 days of receiving your content, hosted and maintained by us.
    tier: Full House
    category: The Whole Engine
  - number: '05'
    title: Email List Building & SMS/Email Campaigns
    short: The list you own — the channel no algorithm can take away.
    description: List building syncs monthly with your POS (Toast, Square, OpenTable, Resy). Full campaign sends — 2–4 a month with trackable redemption codes — are a Full House feature.
    tier: Growth
    category: Get Craved
pages:
  home:
    seo_title: Regulars | Flat-Rate Marketing for Independent Restaurants & Cafés
    seo_description: Regulars is the flat-rate marketing partner for independent, single-location restaurants and cafés. Local SEO, reviews, social, and email that turn first-timers into loyal regulars — published prices, no lock-in.
    hero:
      eyebrow: Marketing for Independent Restaurants & Cafés
      headline: Marketing built for one address — not eleven hundred.
      subhead: Regulars is the flat-rate marketing partner for independent restaurants and cafés that are invisible online. We only do restaurants. We publish our prices. We never lock you in.
      primary_cta:
        label: Book a Free Visibility Audit
        url: /book-a-call/
      secondary_cta:
        label: See How It Works
        url: /process/
    thesis:
      eyebrow: The Thesis
      heading: Why retention is the whole business.
      rows:
        - label: Revenue that comes from repeat guests, not new ones
          value: 65–80%
        - label: First-time guests who never come back
          value: ~70%
        - label: Lifetime value of a regular vs. a one-timer
          value: 26×
      link:
        label: See where these numbers come from →
        url: /ledger/
    split:
      left:
        eyebrow: Who We Are
        heading: A marketing partner that's never run a franchise playbook.
        paragraphs:
          - Regulars is a done-for-you marketing partner built exclusively for independent, single-location restaurants and cafés — never chains, never franchises. The industry's marketing playbook was written for companies with a hundred locations and a marketing department; independents were left to figure it out after a double shift.
          - We're a small business too, so we build like one — hands-on, responsive, and focused on the handful of things that actually bring guests back.
      right:
        eyebrow: What We're Building
        heading: The big-chain playbook, minus the overhead.
        paragraphs:
          - 'Every national chain already does this: own the guest list, own the reputation, make it easy to come back. Independents rarely have the systems to do the same — so we build them, sized and priced for one location.'
        badges:
          - k: Own your list
            v: Email + SMS tied directly to your POS system.
          - k: Own your reputation
            v: Every review answered, every profile managed, every week.
    services_teaser:
      heading: 'Five services. One goal: more regulars.'
      subhead: Everything we do in year one is focused on turning up how often people come back.
      cta:
        label: Explore All Services
        url: /services/
    exclusions:
      eyebrow: Scope, On Purpose
      heading: What's not on the menu (yet).
      subhead: Year one is intentionally narrow. Five things done properly beat fifteen things done halfway.
      chips:
        - Paid ads
        - Funnels
        - Influencer marketing
        - National SEO
        - Cold outreach for clients
        - Custom apps
      quote: That's outside your plan — I keep the menu tight so everything on it actually works.
    cta:
      heading: Ready to fill more tables with regulars?
      subhead: Book a free 20-minute discovery call — no pitch deck, no pressure, just a straight look at where you're losing regulars.
      button:
        label: Book a Free Audit
        url: /book-a-call/
  story:
    values:
      - title: Retention over acquisition
        body: A repeat guest is worth more than ten one-timers. Everything we build points at the second visit, not just the first.
      - title: Own what you build
        body: Your list, your reviews, your Google profile — assets that live with you, not rented from an algorithm.
      - title: Built for one address
        body: No multi-location complexity, no franchise red tape. Just what an independent owner actually needs.
      - title: Process over promises
        body: We're proving this model in real kitchens right now — with a process you can read in full before you ever sign anything.
    values_heading: What we believe
    steps:
      - num: '01'
        heading: 65–80% of a restaurant's revenue comes from people who've already eaten there before.
        body: 'Source: National Restaurant Association.'
      - num: '02'
        heading: And yet roughly 7 out of 10 first-time guests never make it back a second time.
        body: The gap between those two numbers is where most independent restaurants lose money quietly, month after month.
      - num: '03'
        heading: Chains solved this decades ago.
        body: Loyalty programs, CRM systems, marketing teams built entirely around getting people to come back — not just come once.
      - num: '04'
        heading: Independents got left behind — doing it by instinct instead of systems.
        body: Regulars brings the big-chain playbook to the one-location restaurant, at a flat rate.
    eyebrow: Our Story
    outro: 'So that''s what we build: the systems a chain would have, sized and priced for a restaurant with one location and an owner who''s already doing five jobs. We only do restaurants. We publish our prices. We never lock you in.'
    intro: Regulars started at a family table, not a boardroom. It traces back to Sammy's — a family-owned restaurant where **we watched, up close, what actually keeps a small restaurant alive.** It was never really the first-time visitors who carried it through a slow winter or a rough month. It was the regulars — the ones who knew the servers by name, ordered "the usual," and kept showing up.
    seo_title: Our Story | Regulars — Restaurant Marketing Built for One Address
    hero_quote: Every great restaurant is really just a room full of people who keep coming back.
    seo_description: Why we only market independent restaurants and cafés. Regulars brings the big-chain retention playbook to single-location restaurants — built from a family table, priced flat, never locked in.
  services:
    seo_title: Services | Local SEO, Reviews, Social & Email for Restaurants | Regulars
    seo_description: 'Five done-for-you marketing services for independent restaurants and cafés: Google Business & local SEO, review generation, social content, website builds, and email/SMS list building.'
    eyebrow: Services
    heading: Five services, working together to build your regulars.
    subhead: We keep our scope tight on purpose. No paid ads, no funnels, no influencer campaigns in year one — just the five things that reliably turn first-timers into regulars.
    cta:
      label: See Pricing
      url: /pricing/
  process:
    seo_title: Our Process | How Restaurant Marketing Works at Regulars
    seo_description: From free discovery call to monthly reporting — see exactly how Regulars audits, builds, launches, and grows local visibility and retention for independent restaurants and cafés.
    eyebrow: How We Work
    heading: We're pre-launch — so we lead with the process, not manufactured proof.
    subhead: No fake testimonials, no borrowed case studies. Here's exactly what happens, in order, when you work with Regulars.
    steps:
      - num: '01'
        heading: Free Discovery Call
        body: A 20-minute conversation about your restaurant, what’s already working, and where first-timers are slipping through the cracks. No pitch deck.
      - body: We pull your starting numbers — Google views, calls, direction requests, review count and rating, social following, list size — before anything changes, so results are provable, not claimed.
        heading: Audit & Baseline
        num: '02'
      - num: '03'
        heading: Onboarding Build
        body: 'We set up the systems: Google Business Profile, review flow, content calendar, and — for Full House — your website and POS-connected list. Full House builds go live within 21 days.'
      - num: '04'
        heading: Launch
        body: Everything goes live together, so your local visibility, reputation, and retention channels work from the same playbook from day one.
      - num: '05'
        heading: Grow — the monthly cycle
        body: Reviews answered within 48 hours. Reports by the 5th business day of every month, in plain English, measured against your baseline. One human owns your account.
    closing_note: That's the whole process. Nothing hidden behind a "schedule a call to learn more."
    cta:
      label: See What Each Step Costs
      url: /pricing/
  pricing:
    subhead: Most agencies make you book a call just to find out what something costs. We don't. Pick a door.
    heading: Three ways in. Every price, published.
    final_cta:
