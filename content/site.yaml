  catering:
    # Optional page, OFF for the Regulars site. Client sites flip enabled: true,
    # paste the CRM (GHL) form embed, and edit the copy. The copy below is the
    # template default, written for a generic restaurant.
    enabled: false
    seo_title: Catering & Private Events | Check Your Date
    seo_description: Catering and private events. Tell us your date, headcount, and occasion, and hear back fast. Check your date today.
    eyebrow: Catering & Private Events
    heading: Feed a crowd. Skip the phone tag.
    subhead: Tell us about your event below and you'll hear back from us fast, any day, even mid-dinner-rush.
    hero_button: Check My Date
    points:
      - A fast reply, without days of waiting
      - Off-site catering & private dining
      - No deposit to ask a question
    steps_heading: How it works
    steps:
      - num: '01'
        heading: Tell us about your event
        body: Date, headcount, and the occasion. The form takes about a minute.
      - num: '02'
        heading: Get a fast reply
        body: Our events assistant confirms the details and answers the quick questions right away, so nothing waits on a voicemail.
      - num: '03'
        heading: Lock it in with the owner
        body: A quick 15-minute call to set the menu and exact pricing, and then your date is held.
    packages_heading: Ways to feed a crowd
    packages_subhead: Exact pricing depends on your headcount and menu. These are the starting points.
    packages:
      - title: Delivered Trays
        price: from $[price] /person
        items:
          - Family-style trays, delivered and ready to serve
          - Plates, utensils & serving pieces included
          - Delivery within our local radius
      - title: Full-Service Catering
        price: from $[price] /person
        items:
          - We set up, serve, and clean up at your location
          - Custom menu built around your event
          - Staffing available for larger events
      - title: Private Dining Room
        price: room minimum $[price]
        items:
          - Host your event here with a dedicated server
          - Seated dinners & cocktail-style receptions
          - Set menu or limited menu, your call
    packages_note: Every package can flex for dietary needs. Just tell us in the form.
    form_heading: Tell us about your event
    form_subhead: A minute now saves the phone tag later, and you'll hear back from us fast.
    form_embed: ''
    form_subject: New catering inquiry
    form_button: Check My Date
    form_fields:
      - name: name
        placeholder: Your name
        type: text
        required: true
      - name: phone
        placeholder: Mobile number (we'll text you back)
        type: tel
        required: true
      - name: email
        placeholder: Email address
        type: email
        required: true
      - name: event_date
        placeholder: Event date
        type: date
        required: false
      - name: guest_count
        placeholder: Roughly how many guests?
        type: number
        required: false
      - name: occasion
        placeholder: What's the occasion?
        type: text
        required: false
      - name: budget
        placeholder: Budget range (optional)
        type: select
        required: false
        options:
          - Under $500
          - $500 to $1,000
          - $1,000 to $2,500
          - $2,500+
          - Not sure yet
    direct_heading: Rather talk to a person?
    direct_subhead: Call or text us any time, and if we miss your call, we'll text you right back.
    response_promise: Fast, usually the same day
    faq_heading: Quick answers
    faqs:
      - q: How far ahead do I need to book?
        a: The more notice the better, because popular dates go fast, but ask about any date. Short-notice events get flagged straight to the owner.
      - q: Can you handle dietary restrictions?
        a: Yes. Gluten-free, vegetarian, and most allergies are routine for us. Tell us what you need in the form and we'll build around it.
      - q: Do you deliver, or do we pick up?
        a: Both. Delivery is available within our local radius, and pickup is always an option.
      - q: What does it cost to hold a date?
        a: Asking is free. A date is held once you've talked with the owner and placed a deposit, and we'll walk you through it on the call.
    cta:
      heading: Have a date in mind?
      subhead: Popular dates book fast. Asking about yours takes a minute.
      button:
        label: Check My Date
        url: '#catering-form'
