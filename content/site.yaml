components:
  # nav: collapse. Six links wrapped to two rows of 32px pills on a phone and
  #   ate 17.6% of a 375x812 viewport. Below 860px they fold into one control.
  # hero: statement. The wordmark lockup rendered 520x347 and spent 39% of a
  #   900px fold restating a brand the nav already carries 80px above it. The
  #   proposition leads now; the mark closes.
  # menu: tiered. Tier is the question the services page exists to answer, so
  #   it gets its own column instead of a 10.5px chip inside the heading.
  # footer: ledger. Hours and contact as dotted-leader rows on the accent,
  #   which also gives every page a green close.
  # proof: statement. Pre-launch, so the reason there are no case studies is
  #   stated up front instead of living only on the fourth nav item.
  nav: collapse
  hero: statement
  menu: tiered
  footer: ledger
  proof: statement
ui:
  flagship_tag: Most Popular
  accordion_toggle: See everything included
  # Label on the nav disclosure control (components.nav = collapse). If this is
  # empty the collapse variant falls back to a plain link list, so an older
  # config cannot end up with a trapped, unopenable nav.
  nav_menu_label: Menu
  label_email: Email
  label_response: Response time
  label_works_with: We work with
  label_hours: Hours
  label_phone: Phone
  label_address: Address
