# Decap CMS configuration.
# Edits the single build config, content/site.yaml, which Eleventy renders at build time.
# Docs: https://decapcms.org/docs/
#
# Auth is handled by the sveltia-cms-auth Worker (GitHub OAuth proxy), replacing
# Netlify's git-gateway. Editors sign in with GitHub; grant write access to THIS repo only.
backend:
  name: github
  repo: RegularsMktg/regulars-template
  branch: main
  base_url: https://sveltia-cms-auth.vickery-6a4.workers.dev

# Local editing without auth: keep this true and run `npx decap-server`, then open
# http://localhost:8080/admin/ against a local server.
local_backend: true

media_folder: src/assets
public_folder: /assets

collections:
  - name: site
    label: Site
    delete: false
    files:
      - name: config
        label: Site Configuration
        file: content/site.yaml
        description: "Everything about this site. Change component styles under 'Components' to restyle the whole site."
        fields:
          # ---------------- BUSINESS ----------------
          - label: Business
            name: business
            widget: object
            collapsed: true
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Tagline, name: tagline, widget: string }
              - { label: Domain, name: domain, widget: string }
              - { label: Site URL, name: url, widget: string }
              - { label: Language code (html lang), name: lang, widget: string }

          # ---------------- THEME ----------------
          - label: Theme
            name: theme
            widget: object
            collapsed: true
            fields:
              # The field NAMES below (cream, cream2, orange, orange_dark) are
              # historical and stay exactly as they are — renaming them would
              # break every template reference, every client clone's own
              # site.yaml, and this file, for a cosmetic gain. The LABELS say
              # what each colour actually does.
              #
              # The two hints marked PRECONDITION are not style advice. The
              # stylesheet's surface model depends on them, and a palette that
              # breaks either one produces a site that is quietly wrong rather
              # than obviously broken. Full reasoning: design-system/MASTER.md
              # §1.2 and the header of src/assets/styles.css.
              - label: Colors
                name: colors
                widget: object
                fields:
                  - label: "Page field — the main background (currently a warm sand)"
                    name: cream
                    widget: string
                    pattern: ['^#[0-9a-fA-F]{6}$', 'Use a 6-digit hex value, e.g. #D5B38E']
                    hint: "The colour of the whole page. Everything else is measured against this one, so change it first and re-check the two below."
                  - label: "Raised surfaces — cards and panels (MUST be lighter than the page field)"
                    name: cream2
                    widget: string
                    pattern: ['^#[0-9a-fA-F]{6}$', 'Use a 6-digit hex value, e.g. #E3CBAF']
                    hint: "PRECONDITION: this must be a LIGHTER tint of the page field above. Cards, panels and chips are lifted off the page by being lighter, plus a thin bright edge along their top. Pick something darker and the model inverts: every card reads as a hole punched in the page instead of a card resting on it."
                  - label: "Body text"
                    name: charcoal
                    widget: string
                    pattern: ['^#[0-9a-fA-F]{6}$', 'Use a 6-digit hex value, e.g. #2B2926']
                    hint: "Also the ground for the active nav pill. Needs to be dark enough to read comfortably on the page field — aim for 7:1 or better."
                  - label: "Muted text — secondary copy"
                    name: charcoal2
                    widget: string
                    pattern: ['^#[0-9a-fA-F]{6}$', 'Use a 6-digit hex value, e.g. #4A453E']
                    hint: "Most of the running text on the site uses this. It is the tightest contrast pair in the whole palette, so do not lighten it, and do not darken the page field without re-checking it. Minimum 4.5:1 against the page field."
                  - label: "Accent — MUST be dark (currently a deep green)"
                    name: orange
                    widget: string
                    pattern: ['^#[0-9a-fA-F]{6}$', 'Use a 6-digit hex value, e.g. #004437']
                    hint: "PRECONDITION: the accent is not just trim — it is the BACKGROUND of eight components (the CTA panel, the contact panel, the flagship pricing card, the story banner, the newsletter panel, the ink section band, the ledger footer, the full-bleed hero) and text sits on top of it. It must reach 4.5:1 against BOTH white AND your page field colour. Checking white alone is not enough: this site's previous accent reached 4.5:1 on white but only 2.3:1 on the page field, which would have made the copy on every one of those panels unreadable. A mid-tone amber or olive fails both. When in doubt, go darker."
                  - label: "Accent, darker — hover and pressed states"
                    name: orange_dark
                    widget: string
                    pattern: ['^#[0-9a-fA-F]{6}$', 'Use a 6-digit hex value, e.g. #00332A']
                    hint: "A darker version of the accent above. Used when someone hovers or presses a primary button."
                  - label: "Hairlines — borders and dividers"
                    name: line
                    widget: string
                    hint: "An rgba() value, tinted from your body text colour so rules sit in the page rather than on it. Keep the rgba() form."
                  - label: "Hairlines, softer — separators inside lists"
                    name: line_soft
                    widget: string
                    hint: "As above, fainter. Keep the rgba() form."
              - label: Fonts
                name: fonts
                widget: object
                fields:
                  - { label: Heading font-family, name: heading, widget: string }
                  - { label: Body font-family, name: body, widget: string }
                  - { label: Google Fonts <link> href, name: google_href, widget: string }

          # ---------------- IMAGES ----------------
          - label: Images
            name: images
            widget: object
            collapsed: true
            fields:
              - { label: Logo mark, name: logo_mark, widget: image }
              - { label: Hero logo, name: hero_logo, widget: image }

          # ---------------- COMPONENTS (the swappable library) ----------------
          - label: Components (site-wide styles)
            name: components
            widget: object
            fields:
              - label: Navigation
                name: nav
                widget: select
                options: [tabs, topline, collapse]
                hint: "tabs = pill row · topline = plain underlined links · collapse = links fold into one menu control below 860px. Pick collapse if you have five or more links; the other two wrap to a second row on a phone."
              - label: Hero
                name: hero
                widget: select
                options: [textforward, fullbleed, split, statement, marquee, ticket]
                hint: "textforward = centred logo + copy · fullbleed = photo/colour band · split = copy beside an image · statement = text-first, no logo in the fold (best when the headline is the argument) · marquee = your NAME set large on an accent band (best when the sign is the brand) · ticket = a perforated paper dupe, hard left (counter-service, delis, coffee bars)."
              - label: Menu layout
                name: menu
                widget: select
                options: [list, grid, tiered, board]
                hint: "list = numbered rows (use only when order means something) · grid = cards by category · tiered = ruled rows with the badge in its own column (best for a services catalogue) · board = two-column letter board with dotted leaders and prices (best for a long food menu of 20+ items)."
              - label: Footer
                name: footer
                widget: select
                options: [columns, minimal, ledger]
                hint: "columns = three link columns · minimal = brand + one link row · ledger = hours and contact as dotted-leader rows on the accent (best when hours are the most-looked-at fact on the site)."
              - label: Pre-launch proof statement
                name: proof
                widget: select
                options: [off, statement]
                required: false
                hint: "statement = say plainly why there are no testimonials yet, using the wording from your Process page. Switch to off once you have real client results to show."

          # ---------------- INTEGRATIONS (third-party embeds) ----------------
          - label: Integrations
            name: integrations
            widget: object
            collapsed: true
            fields:
              - { label: "Chat widget embed code (e.g. GHL text-us widget; empty = no widget)", name: chat_widget, widget: text, required: false }

          # ---------------- UI STRINGS (small interface labels) ----------------
          - label: UI labels
            name: ui
            widget: object
            collapsed: true
            fields:
              - { label: Flagship pricing tag, name: flagship_tag, widget: string }
              - { label: Pricing accordion toggle, name: accordion_toggle, widget: string }
              - label: Nav menu button label
                name: nav_menu_label
                widget: string
                required: false
                hint: "Only used when Navigation is set to 'collapse'. Leave it empty and the nav simply shows all links instead of folding them behind a button — it never leaves you with a menu that will not open."
              - { label: Contact label — email, name: label_email, widget: string }
              - { label: Contact label — response time, name: label_response, widget: string }
              - { label: Contact label — works with, name: label_works_with, widget: string }
              - { label: Hours heading, name: label_hours, widget: string }
              - { label: Contact label — phone, name: label_phone, widget: string }
              - { label: Contact label — address, name: label_address, widget: string }

          # ---------------- NAV ----------------
          - label: Navigation links
            name: nav
            widget: object
            collapsed: true
            fields:
              - label: Links
                name: links
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: URL, name: url, widget: string }
              - label: Call-to-action button
                name: cta
                widget: object
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: URL, name: url, widget: string }

          # ---------------- FOOTER ----------------
          - label: Footer
            name: footer
            widget: object
            collapsed: true
            fields:
              - { label: Description, name: description, widget: text }
              - label: Columns
                name: columns
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - label: Links
                    name: links
                    widget: list
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: URL, name: url, widget: string }
              - { label: Legal (left), name: legal_left, widget: string }
              - { label: Legal (right), name: legal_right, widget: string }

          # ---------------- CONTACT & HOURS ----------------
          - label: Contact & Hours
            name: contact
            widget: object
            collapsed: true
            fields:
              - { label: Email, name: email, widget: string }
              - { label: Phone (published business line), name: phone, widget: string, required: false }
              - { label: "Street address (published; required for A2P brand match)", name: address, widget: string, required: false }
              - label: Social profiles
                name: social
                widget: list
                required: false
                summary: "{{fields.label}} — {{fields.handle}}"
                fields:
                  - { label: "Platform (e.g. Instagram)", name: label, widget: string }
                  - { label: "Handle shown on the contact page", name: handle, widget: string, required: false }
                  - { label: Profile URL, name: url, widget: string }
              - { label: Response time, name: response_time, widget: string }
              - { label: Works with, name: works_with, widget: string }
              - { label: Formspree contact form ID, name: formspree_contact_id, widget: string }
              - { label: Formspree newsletter form ID, name: formspree_newsletter_id, widget: string }
              - label: Hours
                name: hours
                widget: list
                fields:
                  - { label: Day(s), name: days, widget: string }
                  - { label: Hours, name: hours, widget: string }

          # ---------------- STAMP STRIP ----------------
          - label: Stamp strip (home)
            name: stamps
            widget: list
            collapsed: true
            field: { label: Stamp, name: stamp, widget: string }

          # ---------------- THE MENU ----------------
          - label: The Menu (services)
            name: menu_items
            widget: list
            collapsed: true
            fields:
              - { label: Number, name: number, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Short line, name: short, widget: string }
              - { label: Full description, name: description, widget: text }
              - { label: "Badge (optional — e.g. Foundation / New / Chef's Pick)", name: badge, widget: string, required: false }
              - { label: Category (for grid layout), name: category, widget: string }
              - label: "Price (optional)"
                name: price
                widget: string
                required: false
                hint: "Only shown by the 'board' menu layout. Leave empty and the row renders as name + description with no dotted leader, so a services list without prices still looks right."

          # ---------------- PAGES ----------------
          - label: Pages
            name: pages
            widget: object
            collapsed: true
            fields:
              # ---- HOME ----
              - label: Home
                name: home
                widget: object
                collapsed: true
                fields:
                  - { label: SEO title, name: seo_title, widget: string }
                  - { label: SEO description, name: seo_description, widget: text }
                  - label: Hero
                    name: hero
                    widget: object
                    fields:
                      - { label: Eyebrow, name: eyebrow, widget: string }
                      - { label: Headline, name: headline, widget: string }
                      - { label: Sub-headline, name: subhead, widget: text }
                      - { label: "Background image (used by fullbleed/split hero styles)", name: bg_image, widget: image, required: false, allow_multiple: false }
                      - label: Primary button
                        name: primary_cta
                        widget: object
                        fields:
                          - { label: Label, name: label, widget: string }
                          - { label: URL, name: url, widget: string }
                      - label: Secondary button
                        name: secondary_cta
                        widget: object
                        fields:
                          - { label: Label, name: label, widget: string }
                          - { label: URL, name: url, widget: string }
                  - label: Thesis
                    name: thesis
                    widget: object
                    fields:
                      - { label: Eyebrow, name: eyebrow, widget: string }
                      - { label: Heading, name: heading, widget: string }
                      - label: Rows
                        name: rows
                        widget: list
                        fields:
                          - { label: Label, name: label, widget: string }
                          - { label: Value, name: value, widget: string }
                      - label: Link
                        name: link
                        widget: object
                        fields:
                          - { label: Label, name: label, widget: string }
                          - { label: URL, name: url, widget: string }
                  - label: Split section
                    name: split
                    widget: object
                    fields:
                      - label: Left
                        name: left
                        widget: object
                        fields:
                          - { label: Eyebrow, name: eyebrow, widget: string }
                          - { label: Heading, name: heading, widget: string }
                          - { label: Paragraphs, name: paragraphs, widget: list, field: { label: Paragraph, name: p, widget: text } }
                      - label: Right
                        name: right
                        widget: object
                        fields:
                          - { label: Eyebrow, name: eyebrow, widget: string }
                          - { label: Heading, name: heading, widget: string }
                          - { label: Paragraphs, name: paragraphs, widget: list, field: { label: Paragraph, name: p, widget: text } }
                          - label: Badges
                            name: badges
                            widget: list
                            fields:
                              - { label: Title, name: k, widget: string }
                              - { label: Value, name: v, widget: string }
                  - label: Services teaser
                    name: services_teaser
                    widget: object
                    fields:
                      - { label: Heading, name: heading, widget: string }
                      - { label: Sub-headline, name: subhead, widget: text }
                      - label: CTA
                        name: cta
                        widget: object
                        fields:
                          - { label: Label, name: label, widget: string }
                          - { label: URL, name: url, widget: string }
                  - label: Exclusions
                    name: exclusions
                    widget: object
                    fields:
                      - { label: Eyebrow, name: eyebrow, widget: string }
                      - { label: Heading, name: heading, widget: string }
                      - { label: Sub-headline, name: subhead, widget: text }
                      - { label: Chips, name: chips, widget: list, field: { label: Chip, name: chip, widget: string } }
                      - { label: Pull quote, name: quote, widget: text }
                  - label: Closing CTA
                    name: cta
                    widget: object
                    fields:
                      - { label: Heading, name: heading, widget: string }
                      - { label: Sub-headline, name: subhead, widget: text }
                      - label: Button
                        name: button
                        widget: object
                        fields:
                          - { label: Label, name: label, widget: string }
                          - { label: URL, name: url, widget: string }
              # ---- STORY ----
              - label: Our Story
                name: story
                widget: object
                collapsed: true
                fields:
                  - { label: SEO title, name: seo_title, widget: string }
                  - { label: SEO description, name: seo_description, widget: text }
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Hero quote, name: hero_quote, widget: text }
                  - { label: Intro (supports **bold**), name: intro, widget: text }
                  - label: Steps
                    name: steps
                    widget: list
                    fields:
                      - { label: Number, name: num, widget: string }
                      - { label: Heading, name: heading, widget: string }
                      - { label: Body, name: body, widget: text }
                  - { label: Outro, name: outro, widget: text }
                  - { label: Values heading, name: values_heading, widget: string }
                  - label: Values
                    name: values
                    widget: list
                    fields:
                      - { label: Title, name: title, widget: string }
                      - { label: Body, name: body, widget: text }
              # ---- SERVICES ----
              - label: Services
                name: services
                widget: object
                collapsed: true
                fields:
                  - { label: SEO title, name: seo_title, widget: string }
                  - { label: SEO description, name: seo_description, widget: text }
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Sub-headline, name: subhead, widget: text }
                  - label: CTA
                    name: cta
                    widget: object
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: URL, name: url, widget: string }
              # ---- PROCESS ----
              - label: Process
                name: process
                widget: object
                collapsed: true
                fields:
                  - { label: SEO title, name: seo_title, widget: string }
                  - { label: SEO description, name: seo_description, widget: text }
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Sub-headline, name: subhead, widget: text }
                  - label: Steps
                    name: steps
                    widget: list
                    fields:
                      - { label: Number, name: num, widget: string }
                      - { label: Heading, name: heading, widget: string }
                      - { label: Body, name: body, widget: text }
                  - { label: Closing note, name: closing_note, widget: text }
                  - label: CTA
                    name: cta
                    widget: object
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: URL, name: url, widget: string }
              # ---- PRICING ----
              - label: Pricing
                name: pricing
                widget: object
                collapsed: true
                fields:
                  - { label: SEO title, name: seo_title, widget: string }
                  - { label: SEO description, name: seo_description, widget: text }
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Sub-headline, name: subhead, widget: text }
                  - label: Door One
                    name: door_one
                    widget: object
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: Title, name: title, widget: string }
                      - { label: Body, name: body, widget: text }
                      - label: Button
                        name: button
                        widget: object
                        fields:
                          - { label: Label, name: label, widget: string }
                          - { label: URL, name: url, widget: string }
                  - label: Door Two
                    name: door_two
                    widget: object
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: Title, name: title, widget: string }
                      - { label: Sub-headline, name: subhead, widget: text }
                      - label: Projects
                        name: projects
                        widget: list
                        fields:
                          - { label: Title, name: title, widget: string }
                          - { label: Price, name: price, widget: string }
                          - { label: Items, name: items, widget: list, field: { label: Item, name: item, widget: string } }
                      - { label: Note (supports **bold**), name: note, widget: text }
                  - label: Door Three
                    name: door_three
                    widget: object
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: Title, name: title, widget: string }
                      - { label: Sub-headline, name: subhead, widget: text }
                      - label: Tiers
                        name: tiers
                        widget: list
                        fields:
                          - { label: Name, name: name, widget: string }
                          - { label: Amount, name: amount, widget: string }
                          - { label: Per line, name: per, widget: string }
                          - { label: Flagship?, name: flagship, widget: boolean, default: false }
                          - { label: Summary bullets, name: summary, widget: list, field: { label: Bullet, name: bullet, widget: string } }
                          - label: Detail groups
                            name: details
                            widget: list
                            fields:
                              - { label: Heading, name: heading, widget: string }
                              - { label: Items, name: items, widget: list, field: { label: Item, name: item, widget: string } }
                          - { label: Not included, name: not_included, widget: text }
                          - label: Button
                            name: button
                            widget: object
                            fields:
                              - { label: Label, name: label, widget: string }
                              - { label: URL, name: url, widget: string }
                  - { label: Add-ons heading, name: addons_heading, widget: string }
                  - { label: Add-ons sub-headline, name: addons_subhead, widget: text }
                  - label: Add-ons
                    name: addons
                    widget: list
                    fields:
                      - { label: Name, name: name, widget: string }
                      - { label: Price, name: price, widget: string }
                  - { label: Guarantees heading, name: guarantees_heading, widget: string }
                  - label: Guarantees
                    name: guarantees
                    widget: list
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: Value, name: value, widget: string }
                  - { label: Guarantees quote, name: guarantees_quote, widget: text }
                  - label: Final CTA
                    name: final_cta
                    widget: object
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: URL, name: url, widget: string }
              # ---- LEDGER ----
              - label: The Ledger
                name: ledger
                widget: object
                collapsed: true
                fields:
                  - { label: SEO title, name: seo_title, widget: string }
                  - { label: SEO description, name: seo_description, widget: text }
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Sub-headline, name: subhead, widget: text }
                  - { label: Signup heading, name: signup_heading, widget: string }
                  - { label: Signup sub-headline, name: signup_subhead, widget: string }
                  - { label: Signup micro-text, name: signup_micro, widget: string }
                  - { label: Signup email placeholder, name: signup_placeholder, widget: string }
                  - { label: Signup button label, name: signup_button, widget: string }
                  - { label: Signup email subject line, name: signup_subject, widget: string }
                  - { label: Research heading, name: research_heading, widget: string }
                  - { label: Research sub-headline, name: research_subhead, widget: text }
                  - label: Stats
                    name: stats
                    widget: list
                    fields:
                      - { label: Value, name: value, widget: string }
                      - { label: Description, name: desc, widget: text }
                      - { label: Source, name: source, widget: string }
                  - label: Issue preview
                    name: issue
                    widget: object
                    fields:
                      - { label: Tag, name: tag, widget: string }
                      - { label: Title, name: title, widget: string }
                      - { label: Paragraphs, name: paragraphs, widget: list, field: { label: Paragraph, name: p, widget: text } }
                      - { label: Signature, name: signature, widget: string }
                  - { label: Footer prompt, name: footer_prompt, widget: string }
                  - label: Footer CTA
                    name: footer_cta
                    widget: object
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: URL, name: url, widget: string }
              # ---- CONTACT ----
              - label: Book a Call
                name: contact
                widget: object
                collapsed: true
                fields:
                  - { label: SEO title, name: seo_title, widget: string }
                  - { label: SEO description, name: seo_description, widget: text }
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Sub-headline, name: subhead, widget: text }
                  - { label: Form heading, name: form_heading, widget: string }
                  - { label: Form sub-headline, name: form_subhead, widget: text }
                  - { label: Form button, name: form_button, widget: string }
                  - { label: Form email subject line, name: form_subject, widget: string }
                  - label: Form fields
                    name: form_fields
                    widget: list
                    fields:
                      - { label: "Field name (for the email you receive)", name: name, widget: string }
                      - { label: Placeholder text, name: placeholder, widget: string }
                      - { label: Type, name: type, widget: select, options: [text, email, tel] }
                      - { label: Required?, name: required, widget: boolean, default: false }
                  - { label: Direct heading, name: direct_heading, widget: string }
                  - { label: Direct sub-headline, name: direct_subhead, widget: text }
              # ---- CATERING (optional page) ----
              - label: Catering & Private Events
                name: catering
                widget: object
                collapsed: true
                fields:
                  - { label: "Enable this page? (builds /catering/ when on)", name: enabled, widget: boolean, default: false }
                  - { label: SEO title, name: seo_title, widget: string }
                  - { label: SEO description, name: seo_description, widget: text }
                  - { label: Eyebrow, name: eyebrow, widget: string }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Sub-headline, name: subhead, widget: text }
                  - { label: Hero button label (scrolls to the form), name: hero_button, widget: string }
